{% extends "base.html" %}
{% block title %}Verify Email — garments{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <span class="brand-dot"></span>
            <h1>Verify your email</h1>
            <p>Enter the 6-digit code sent to <strong>{{ email }}</strong></p>
        </div>
        <form method="POST" class="auth-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="form-group">
                <label for="code">Verification Code</label>
                <input type="text" id="code" name="code" placeholder="000000" required
                       autocomplete="one-time-code" inputmode="numeric"
                       pattern="[0-9]{6}" maxlength="6"
                       style="font-size:1.5rem; text-align:center; letter-spacing:8px; font-weight:700;
                              padding:14px 16px; background:var(--bg); border:1px solid var(--border);
                              border-radius:var(--radius-sm); color:var(--text-primary);
                              font-family:var(--font-sans); width:100%; outline:none;
                              transition:border-color 0.2s;"
                       onfocus="this.style.borderColor='var(--accent)'"
                       onblur="this.style.borderColor='var(--border)'">
            </div>
            <button type="submit" class="btn btn-full">Verify Email</button>
        </form>
        <div class="auth-footer" style="margin-top:16px;">
            <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:8px;">
                Didn't receive the code?
            </p>
            <form method="POST" action="{{ url_for('resend_code') }}" style="display:inline;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <input type="hidden" name="email" value="{{ email }}">
                <button type="submit" class="btn btn-sm btn-ghost">Resend code</button>
            </form>
        </div>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
