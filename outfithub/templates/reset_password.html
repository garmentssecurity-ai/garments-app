{% extends "base.html" %}
{% block title %}Set New Password — garments{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Set new password</h1>
            <p>Choose a strong password for your account</p>
        </div>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="8" autocomplete="new-password">
                <div class="input-hint">At least 8 characters, with uppercase, lowercase &amp; a digit</div>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" required minlength="8" autocomplete="new-password">
            </div>
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <button type="submit" class="btn btn-full">Reset Password</button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}">Back to login</a>
        </div>
    </div>
</div>
{% endblock %}
